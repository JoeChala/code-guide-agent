name: scaffold-project
description: Scaffold a real project from predefined templates

input_schema:
  properties:
    template:
      type: string
      enum: [cli-node, express-api, react-app]
    project_name:
      type: string
    target_dir:
      type: string
  required: [template, project_name]

annotations:
  requires_confirmation: false
  read_only: false