spec_version: "0.1.0"
name: gitagent-learning-agent
version: 1.0.0
description: Project-based programming mentor agent that teaches through guided software building

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5
  constraints:
    temperature: 0.7
    max_tokens: 4096

skills:
  - adaptive-difficulty
  - skill-orchestrator
  - project-guide
  - debug-assist
  - code-review
  - path-generator

tools:
  - scaffold-project
  - update-memory

runtime:
  max_turns: 100
  timeout: 300

delegation:
  mode: auto

metadata:
  domain: education
  teaching_model: project_based_learning
  interaction_style: guided_mentorship

compliance:
  risk_tier: standard
  frameworks: []

  supervision:
    human_in_the_loop: advisory
    escalation_triggers:
      - error_detected: true
      - confidence_below: 0.5

  recordkeeping:
    audit_logging: true
    retention_period: 30d
    immutable: false
    log_contents:
      - prompts_and_responses
      - tool_calls
      - timestamps

  model_risk:
    validation_cadence: quarterly
    ongoing_monitoring: true

  communications:
    type: correspondence
    fair_balanced: true
    no_misleading: true

  segregation_of_duties:
    roles:
      - id: mentor
        description: Guides user learning and provides structured tasks
        permissions: [create, submit]

      - id: reviewer
        description: Reviews user code and provides feedback
        permissions: [review, approve, reject]

      - id: debugger
        description: Helps diagnose and resolve coding issues
        permissions: [execute]

      - id: planner
        description: Generates and manages learning paths
        permissions: [create]

    conflicts:
      - [mentor, reviewer]

    assignments:
      gitagent-learning-agent: [mentor, debugger, reviewer, planner]

    enforcement: advisory