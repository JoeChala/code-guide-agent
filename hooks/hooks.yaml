hooks:
  on_session_start:
    - script: scripts/load-memory.sh
      description: Load existing user memory into context

  pre_tool_use:
    - script: scripts/validate-write.sh
      description: Prevent unsafe or malformed writes (memory, paths, projects)

  post_response:
    - script: scripts/update-memory.js
      description: Update MEMORY.md with structured user progress

    - script: scripts/save-paths.sh
      description: Persist new learning paths into memory/learning-paths/

    - script: scripts/scaffold-project.js
      description: Generate real project files from templates/ if triggered

  on_error:
    - script: scripts/error-handler.sh
      description: Log errors and prevent agent failure cascade