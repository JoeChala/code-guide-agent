hooks:
  on_session_start:
    - script: scripts/load-memory.sh
      description: Load memory into context

  pre_tool_use:
    - script: scripts/validate-write.sh
      description: Validate safe file operations

  post_tool_use:
    - script: scripts/update-memory.js
      description: Update structured memory after tool execution

    - script: scripts/save-paths.sh
      description: Persist generated learning paths

  on_error:
    - script: scripts/error-handler.sh
      description: Log runtime errors